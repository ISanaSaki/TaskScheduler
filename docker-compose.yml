services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: scheduler_db
    ports:
      - "5434:5432"
    restart: always

  redis:
    image: redis:7
    ports:
      - "6380:6379"
    restart: always

  worker:
    build: .
    command: celery -A app.worker.celery_app.celery_app worker --loglevel=info --pool=solo
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: always

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    ports:
      - "8002:8000"
    depends_on:
      - db
      - redis
    restart: always