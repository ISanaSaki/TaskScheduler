<!DOCTYPE html>
<html>
<body>
    <h2>Task Status</h2>
    <input type="number" id="taskId" placeholder="Task ID" />
    <input type="text" id="token" placeholder="JWT access token" style="width:300px" />
    <button onclick="connect()">Connect</button>
    <div id="output"></div>

    <script>
        let ws;

        function connect() {
            const taskId = document.getElementById("taskId").value;
            const token = document.getElementById("token").value;
            ws = new WebSocket(`ws://127.0.0.1:8000/ws/tasks/${taskId}?token=${encodeURIComponent(token)}`);

            ws.onopen = () => {
                document.getElementById("output").innerHTML = "Connected...";
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                document.getElementById("output").innerHTML =
                    `Status: ${data.status} <br> Result: ${data.result}`;
            };

            ws.onerror = () => {
                document.getElementById("output").innerHTML = "Connection error (check token/task ID)";
            };
        }
    </script>
</body>
</html>
